# Phase 5A — 7 scénarios enrichis avec pondération réaliste
scenarios:

  - id: mise_a_jour_progression
    type: add_comment
    weight: 25
    description: "Commentaire de suivi d'un DEV sur une Story en IN PROGRESS"
    constraints:
      issue_types: ["Story", "Feature"]
      statuses: ["IN PROGRESS"]
      actor_roles: ["DEV", "lead"]

  - id: synthese_epic
    type: add_comment
    weight: 12
    description: "Commentaire de suivi du Lead sur une Epic en cours"
    constraints:
      issue_types: ["Epic"]
      statuses: ["IN PROGRESS", "TO DO", "IDEA"]
      actor_roles: ["lead", "BA"]

  - id: engagement
    type: change_status
    weight: 20
    description: "Passage d'un ticket de TO DO / IDEA à IN PROGRESS"
    constraints:
      issue_types: ["Story", "Bug", "Task", "Feature", "Epic"]
      statuses: ["TO DO", "IDEA"]
      target_status: "IN PROGRESS"
      actor_roles: ["DEV", "lead", "BA"]

  - id: demande_review
    type: change_status
    weight: 15
    description: "Passage de IN PROGRESS à IN REVIEW — DEV ou Lead uniquement"
    constraints:
      issue_types: ["Story", "Bug", "Feature"]
      statuses: ["IN PROGRESS"]
      target_status: "IN REVIEW"
      actor_roles: ["DEV", "lead"]

  - id: finalisation
    type: change_status
    weight: 12
    description: "Passage de IN REVIEW à DONE — QA, BA ou Lead uniquement"
    constraints:
      issue_types: ["Story", "Bug", "Task", "Feature"]
      statuses: ["IN REVIEW"]
      target_status: "DONE"
      actor_roles: ["QA", "BA", "lead"]
      guard: "no_open_subtasks"

  - id: precision_qa
    type: add_comment
    weight: 10
    description: "Commentaire d'un QA sur un ticket en IN REVIEW"
    constraints:
      issue_types: ["Story", "Bug", "Feature"]
      statuses: ["IN REVIEW"]
      actor_roles: ["QA", "lead"]

  - id: blocage
    type: change_status
    weight: 8
    description: "Passage au statut BLOCKED avec commentaire IA obligatoire"
    constraints:
      issue_types: ["Story", "Bug", "Feature"]
      statuses: ["IN PROGRESS", "IN REVIEW"]
      target_status: "BLOCKED"
      actor_roles: ["DEV", "QA", "lead"]
      requires_ai_comment: true

  - id: passage_de_relais
    type: change_assignee
    weight: 10
    description: "Réassignation d'un ticket en cours à un autre membre"
    constraints:
      issue_types: ["Story", "Bug", "Task", "Feature"]
      statuses: ["IN PROGRESS", "IN REVIEW", "BLOCKED"]
      actor_roles: ["lead", "DEV", "BA"]

  # --- Phase 5B — 14 nouveaux scénarios ---

  - id: deblocage
    type: change_status
    weight: 9
    description: "Passage de BLOCKED vers IN PROGRESS — déblocage d'un ticket"
    constraints:
      issue_types: ["Story", "Bug", "Feature", "Task"]
      statuses: ["BLOCKED"]
      target_status: "IN PROGRESS"
      actor_roles: ["DEV", "lead", "BA"]

  - id: rejet_review
    type: change_status
    weight: 7
    description: "Retour d'un ticket de IN REVIEW vers IN PROGRESS après retour QA"
    constraints:
      issue_types: ["Story", "Bug", "Feature"]
      statuses: ["IN REVIEW"]
      target_status: "IN PROGRESS"
      actor_roles: ["QA", "lead"]

  - id: incident_run
    type: create_issue
    weight: 5
    description: "Création d'un Bug Medium directement en TO DO (incident production)"
    constraints:
      actor_roles: ["QA", "lead", "DEV"]
      issue_type_to_create: "Bug"
      priority_to_create: "Medium"
      initial_status: "TO DO"

  - id: urgence_production
    type: create_issue
    weight: 3
    description: "Création d'un Bug Highest passant immédiatement en IN PROGRESS"
    constraints:
      actor_roles: ["lead", "QA"]
      issue_type_to_create: "Bug"
      priority_to_create: "Highest"
      initial_status: "IN PROGRESS"

  - id: affinement_backlog
    type: add_comment
    weight: 8
    description: "Commentaire d'affinement sur une Epic ou Story en TO DO / IDEA"
    constraints:
      issue_types: ["Epic", "Story", "Feature"]
      statuses: ["TO DO", "IDEA"]
      actor_roles: ["lead", "BA"]

  - id: decomposition
    type: create_subtask
    weight: 5
    description: "Création d'une sous-tâche sur une Story existante en IN PROGRESS"
    constraints:
      issue_types: ["Story", "Feature"]
      statuses: ["IN PROGRESS"]
      actor_roles: ["DEV", "lead"]

  - id: lien_dependance
    type: create_link
    weight: 4
    description: "Création d'un lien 'is blocked by' entre deux tickets"
    constraints:
      issue_types: ["Story", "Bug", "Feature"]
      statuses: ["IN PROGRESS", "TO DO"]
      actor_roles: ["lead", "DEV"]
      link_type: "is blocked by"

  - id: repriorisation
    type: update_field
    weight: 5
    description: "Changement de priorité d'un ticket en TO DO"
    constraints:
      issue_types: ["Story", "Bug", "Feature", "Epic"]
      statuses: ["TO DO", "IDEA"]
      actor_roles: ["lead", "BA"]
      field_to_update: "priority"

  - id: alimentation_produit
    type: create_issue
    weight: 4
    description: "Création d'une nouvelle User Story rattachée à une Epic existante"
    constraints:
      actor_roles: ["BA", "lead"]
      issue_type_to_create: "Story"
      priority_to_create: "Medium"
      initial_status: "TO DO"
      requires_epic: true

  - id: bug_de_dev
    type: create_issue
    weight: 4
    description: "Création d'un Bug lié à une Story pendant le cycle de dev"
    constraints:
      actor_roles: ["DEV", "QA"]
      issue_type_to_create: "Bug"
      priority_to_create: "Medium"
      initial_status: "TO DO"
      link_to_parent: true

  - id: auto_assignation
    type: change_assignee
    weight: 6
    description: "Un membre s'assigne lui-même un ticket en TO DO"
    constraints:
      issue_types: ["Story", "Bug", "Task", "Feature"]
      statuses: ["TO DO", "IDEA"]
      actor_roles: ["DEV", "BA", "lead"]
      assign_to_self: true

  - id: nettoyage
    type: change_status
    weight: 3
    description: "Passage d'un vieux ticket en CANCELLED — tout statut sauf DONE"
    constraints:
      issue_types: ["Story", "Bug", "Task", "Feature"]
      statuses: ["TO DO", "IDEA", "IN PROGRESS", "BLOCKED"]
      target_status: "CANCELLED"
      actor_roles: ["lead", "BA"]

  - id: re_estimation
    type: update_field
    weight: 4
    description: "Modification des Story Points d'un ticket en cours"
    constraints:
      issue_types: ["Story", "Feature", "Bug"]
      statuses: ["TO DO", "IN PROGRESS", "BLOCKED"]
      actor_roles: ["DEV", "lead", "BA"]
      field_to_update: "story_points"

  - id: relance_lead
    type: add_comment
    weight: 6
    description: "Commentaire du Lead sur un ticket stagnant (last_updated > 3 jours)"
    constraints:
      issue_types: ["Story", "Bug", "Feature", "Epic"]
      statuses: ["IN PROGRESS", "BLOCKED"]
      actor_roles: ["lead"]
      guard: "stagnant_ticket"

  # --- Phase 5D — Scénarios de cohérence produit et collaboration ---

  - id: demande_clarification_metier
    type: add_comment
    weight: 12
    description: "Un DEV demande des précisions au BA sur une Story en IN PROGRESS"
    constraints:
      issue_types: ["Story", "Feature"]
      statuses: ["IN PROGRESS"]
      actor_roles: ["DEV"]
      target_actor_roles: ["BA"]

  - id: fragmentation_story
    type: split_issue
    weight: 3
    description: "Une Story trop complexe est divisée en deux nouvelles Stories"
    constraints:
      issue_types: ["Story"]
      statuses: ["IN PROGRESS"]
      actor_roles: ["lead", "BA"]
      new_issue_initial_status: "TO DO"

  - id: propagation_epic_progress
    type: change_status
    weight: 6
    description: "L'Epic passe en IN PROGRESS (déclenché par une Story enfant)"
    constraints:
      issue_types: ["Epic"]
      statuses: ["TO DO", "IDEA"]
      target_status: "IN PROGRESS"
      actor_roles: ["lead", "BA", "DEV"]
      guard: "random_80_percent"

  - id: lien_transverse_inter_equipes
    type: create_link
    weight: 4
    description: "Lien 'Relates to' entre un ticket d'un projet et un autre projet"
    constraints:
      issue_types: ["Story", "Feature", "Bug"]
      statuses: ["TO DO", "IN PROGRESS"]
      actor_roles: ["lead", "BA"]
      link_type: "relates to"
      cross_project: true

  - id: tache_hors_epic_erreur
    type: create_issue
    weight: 4
    description: "Création d'une Task isolée sans Epic (erreur humaine ou Run pur)"
    constraints:
      actor_roles: ["DEV", "BA"]
      issue_type_to_create: "Task"
      initial_status: "TO DO"
      requires_epic: false

  - id: etiquetage_version
    type: update_field
    weight: 7
    description: "Ajout de labels de version ou de domaine sur un ticket"
    constraints:
      issue_types: ["Story", "Bug", "Feature"]
      statuses: ["IN PROGRESS", "IN REVIEW"]
      actor_roles: ["lead", "QA", "BA"]
      field_to_update: "labels"

  - id: cloture_epic
    type: change_status
    weight: 2
    description: "Passage d'une Epic à DONE quand la majorité des enfants sont terminés"
    constraints:
      issue_types: ["Epic"]
      statuses: ["IN PROGRESS"]
      target_status: "DONE"
      actor_roles: ["BA", "lead"]
      guard: "epic_majority_done"

  - id: pret_mise_en_service
    type: change_status
    weight: 4
    description: "Passage de plusieurs tickets IN REVIEW vers DONE (fin de batch)"
    constraints:
      issue_types: ["Story", "Bug", "Feature"]
      statuses: ["IN REVIEW"]
      target_status: "DONE"
      actor_roles: ["QA", "lead"]
      is_bulk: true
      bulk_max: 4
